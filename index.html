<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Árvore Rubro-Negra - Encomendas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .node circle {
            stroke: #fff;
            stroke-width: 2px;
        }
        .node text {
            font: 16px sans-serif; /* Aumentado para melhor legibilidade */
            fill: white;
            font-weight: bold;
        }
        .link {
            fill: none;
            stroke: #ccc;
            stroke-width: 2px;
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <div class="w-full max-w-[98%] mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold mb-6 text-gray-800 border-b pb-4">Gerenciador de Encomendas (Árvore Rubro-Negra)</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="bg-gray-50 p-6 border rounded-lg shadow-sm h-fit">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Painel de Controle</h2>
                <form id="form-cadastro" onsubmit="salvarEncomenda(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="hidden" id="encomenda-id" value="">
                    
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nome do Produto</label>
                        <input type="text" id="novo-nome" placeholder="Ex: Placa de Vídeo" required class="w-full border p-2 rounded focus:ring-2 outline-none">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Data</label>
                        <input type="date" id="nova-data" required class="w-full border p-2 rounded focus:ring-2 outline-none">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Peso</label>
                        <input type="number" id="novo-peso" step="0.01" required class="w-full border p-2 rounded focus:ring-2 outline-none">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Qtd</label>
                        <input type="number" id="nova-qtd" required class="w-full border p-2 rounded focus:ring-2 outline-none">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Prioridade (1-5)</label>
                        <input type="number" id="nova-prio" min="1" max="5" required class="w-full border p-2 rounded focus:ring-2 outline-none">
                    </div>
                    
                    <button type="submit" id="btn-submit" class="bg-indigo-600 text-white px-4 py-3 rounded-lg hover:bg-indigo-700 font-bold transition-colors md:col-span-2">
                        + Cadastrar / Atualizar
                    </button>
                </form>

                <div class="mt-4 flex gap-2">
                    <button type="button" onclick="gerarMassaTeste(10)" class="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600 font-bold text-sm w-full">
                        Gerar 10 Aleatórios
                    </button>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="bg-green-50 border-2 border-green-500 p-4 rounded-xl shadow-md flex justify-between items-center transition-all" id="quadro-entrega">
                    <div>
                        <h3 class="text-xs font-bold text-green-700 uppercase tracking-wider mb-1">Próxima Entrega (Maior Prioridade)</h3>
                        <p id="txt-proxima-entrega" class="text-lg font-bold text-gray-800">Carregando...</p>
                        <p id="txt-proxima-detalhes" class="text-sm text-gray-600"></p>
                    </div>
                    <button onclick="despacharProxima()" id="btn-despachar" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 font-extrabold shadow-lg transform active:scale-95 transition-all">
                        Despachar Pacote
                    </button>
                </div>

                <div class="overflow-x-auto h-72 overflow-y-auto border rounded-xl shadow-sm">
                    <table class="w-full text-left border-collapse bg-white">
                        <thead class="sticky top-0 bg-gray-800 text-white">
                            <tr>
                                <th class="p-3">ID</th>
                                <th class="p-3">Produto</th>
                                <th class="p-3">Data</th>
                                <th class="p-3">Peso</th>
                                <th class="p-3 text-center">Qtd</th>
                                <th class="p-3 text-center">Prio</th>
                                <th class="p-3 text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-corpo" class="text-gray-700 text-sm">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-8 bg-slate-50 p-4 border rounded-xl shadow-inner">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-700">Visualizador Estrutural</h2>
                <select id="tipo-arvore" onchange="desenharArvore()" class="border p-2 rounded font-semibold text-slate-700">
                    <option value="id">Árvore por ID</option>
                    <option value="prioridade">Árvore por Prioridade</option>
                </select>
            </div>
            <div id="tree-container" class="overflow-auto border rounded bg-white w-full h-[800px] flex justify-center items-center">
            </div>
        </div>
    </div>

    <script>
        // Função para carregar itens na tabela
        async function carregarTabela() {
            try {
                const url = document.getElementById('tipo-arvore').value === 'id' 
                    ? 'http://localhost:8000/encomendas' 
                    : 'http://localhost:8000/encomendas/prioridade';
                
                const resposta = await fetch(url);
                const encomendas = await resposta.json();
                
                const corpoTabela = document.getElementById('tabela-corpo');
                corpoTabela.innerHTML = ""; 
                
                encomendas.forEach(enc => {
                    corpoTabela.innerHTML += `
                        <tr class="hover:bg-gray-100 border-b">
                            <td class="p-3 font-semibold text-gray-500">${enc.id}</td>
                            <td class="p-3 font-medium">${enc.nome}</td>
                            <td class="p-3 text-gray-600 truncate max-w-[90px]">${enc.data_postagem}</td>
                            <td class="p-3 whitespace-nowrap">${enc.peso.toFixed(2)} kg</td>
                            <td class="p-3 text-center">${enc.quantidade}</td>
                            <td class="p-3 text-center">
                                <span class="px-2 py-1 rounded text-xs font-bold ${
                                    enc.prioridade >= 4 ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'
                                }">P${enc.prioridade}</span>
                            </td>
                            <td class="p-3 text-center">
                                <button onclick="deletarEncomenda(${enc.id})" class="text-red-500 hover:text-red-700 font-bold">X</button>
                            </td>
                        </tr>`;
                });
            } catch (error) {
                console.error("Erro:", error);
            }
        }

        async function salvarEncomenda(event) {
            event.preventDefault(); 
            const payload = {
                nome: document.getElementById('novo-nome').value,
                data_postagem: document.getElementById('nova-data').value,
                peso: parseFloat(document.getElementById('novo-peso').value),
                quantidade: parseInt(document.getElementById('nova-qtd').value),
                prioridade: parseInt(document.getElementById('nova-prio').value)
            };

            try {
                await fetch('http://localhost:8000/encomendas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                document.getElementById('form-cadastro').reset();
                carregarTodaInterface();
            } catch (error) {
                alert("Erro ao salvar.");
            }
        }

        async function deletarEncomenda(id) {
            if(!confirm("Excluir?")) return;
            await fetch(`http://localhost:8000/encomendas/${id}`, { method: 'DELETE' });
            carregarTodaInterface();
        }
        
        async function gerarMassaTeste(qtd) {
            await fetch(`http://localhost:8000/gerar-teste/${qtd}`, { method: 'POST' });
            carregarTodaInterface();
        }

        async function atualizarQuadroEntrega() {
            try {
                const resposta = await fetch('http://localhost:8000/encomendas/proxima');
                const pNome = document.getElementById('txt-proxima-entrega');
                const pDetalhes = document.getElementById('txt-proxima-detalhes');
                const btn = document.getElementById('btn-despachar');

                if(!resposta.ok) { 
                    pNome.innerText = "Nenhuma encomenda na fila";
                    pNome.className = "text-lg font-bold text-gray-400";
                    pDetalhes.innerText = "Sua árvore está vazia.";
                    btn.disabled = true;
                    btn.className = "bg-gray-300 text-gray-500 px-6 py-3 rounded-lg font-extrabold shadow-none cursor-not-allowed";
                    return; 
                }
                
                const enc = await resposta.json();
                
                pNome.innerText = `[ID: ${enc.id}] ${enc.nome}`;
                pNome.className = "text-xl font-extrabold text-gray-800";
                
                const corPrio = enc.prioridade >= 4 ? 'text-red-600' : 'text-blue-600';
                pDetalhes.innerHTML = `Prioridade Nível: <span class="font-bold ${corPrio}">${enc.prioridade}</span>`;
                
                btn.disabled = false;
                btn.className = "bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 font-extrabold shadow-lg transform active:scale-95 transition-all";
                btn.onclick = () => despacharProxima(enc.id);
                
            } catch(e) { }
        }

        async function despacharProxima(id) {
            try {
                await fetch(`http://localhost:8000/encomendas/${id}`, { method: 'DELETE' });
                document.getElementById('quadro-entrega').classList.add('bg-green-100');
                setTimeout(() => document.getElementById('quadro-entrega').classList.remove('bg-green-100'), 200);
                
                carregarTodaInterface();
            } catch (error) {
                alert("Erro ao despachar a encomenda.");
            }
        }

        // ====== Código D3.js para desenhar a Árvore ======
        async function desenharArvore() {
            const tipo = document.getElementById('tipo-arvore').value;
            const container = document.getElementById('tree-container');
            container.innerHTML = ""; // Limpa a árvore atual

            try {
                const res = await fetch(`http://localhost:8000/arvore/${tipo}`);
                const treeData = await res.json();

                if (!treeData) {
                    container.innerHTML = '<span class="text-gray-400">Árvore vazia</span>';
                    return;
                }

                // Configurações dinâmicas do SVG baseadas no container
                const width = container.clientWidth || 800;
                const height = 750;
                const margin = { top: 60, right: 20, bottom: 40, left: 20 };

                // Convertendo para o formato do D3 Hierarchy
                const root = d3.hierarchy(treeData, d => {
                    const children = [];
                    if (d.esq) children.push(d.esq);
                    if (d.dir) children.push(d.dir);
                    return children;
                });

                // Utilizando nodeSize para manter o espaçamento fixo e legível entre nós
                const treeLayout = d3.tree().nodeSize([85, 100]);
                treeLayout(root);

                const svg = d3.select("#tree-container").append("svg")
                    .attr("width", "100%")
                    .attr("height", height)
                    .call(d3.zoom().on("zoom", (event) => {
                        svgG.attr("transform", event.transform);
                    }));

                // Posiciona a raiz no meio horizontal do container
                const svgG = svg.append("g")
                    .attr("transform", `translate(${width / 2},${margin.top})`);

                // Adiciona links (linhas)
                svgG.selectAll(".link")
                    .data(root.links())
                    .enter().append("path")
                    .attr("class", "link")
                    .attr("d", d3.linkVertical()
                        .x(d => d.x)
                        .y(d => d.y));

                // Adiciona os nós
                const node = svgG.selectAll(".node")
                    .data(root.descendants())
                    .enter().append("g")
                    .attr("class", "node")
                    .attr("transform", d => `translate(${d.x},${d.y})`);

                // Círculo com tamanho aumentado (raio de 35px)
                node.append("circle")
                    .attr("r", 35)
                    .style("fill", d => d.data.cor === "vermelho" ? "#ef4444" : "#1f2937");

                // Texto centralizado dentro do círculo maior
                node.append("text")
                    .attr("dy", "5")
                    .attr("text-anchor", "middle")
                    .text(d => d.data.chave);

            } catch(e) {
                console.error("Erro ao desenhar árvore:", e);
            }
        }

        function carregarTodaInterface() {
            carregarTabela();
            atualizarQuadroEntrega();
            desenharArvore();
        }

        // Inicializa
        window.onload = carregarTodaInterface;
    </script>
</body>
</html>
